version: '3.8'

services:
  pos-api:
    build:
      context: ./gbs-pos-api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://gbspos:gbspos_secret@postgres:5432/gbs_pos?sslmode=disable
      - JWT_SECRET=your-super-secret-jwt-key-minimum-32-characters
      - PORT=8080
      - ENV=production
      - LOG_LEVEL=info
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pos-uploads:/uploads/pos
    restart: unless-stopped

  cms-api:
    build:
      context: ./gbs-cms-api
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      - DATABASE_URL=postgres://gbspos:gbspos_secret@postgres:5432/gbs_pos?sslmode=disable
      - JWT_SECRET=your-super-secret-jwt-key-minimum-32-characters
      - PORT=8081
      - ENV=production
      - LOG_LEVEL=info
      - UPLOAD_DIR=/uploads/ads
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - cms-uploads:/uploads/ads
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=gbs_pos
      - POSTGRES_USER=gbspos
      - POSTGRES_PASSWORD=gbspos_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gbspos"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  pos-uploads:
  cms-uploads:
