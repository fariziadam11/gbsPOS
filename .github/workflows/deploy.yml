name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
      - name: Test POS API
        run: cd gbs-pos-api && go test ./... -count=1
      - name: Test CMS API
        run: cd gbs-cms-api && go test ./... -count=1

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push POS API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./gbs-pos-api/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/gbs-pos-api:latest

      - name: Build & push CMS API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./gbs-cms-api/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/gbs-cms-api:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/gbs
            docker compose -f docker-compose.prod.yml --env-file .env pull
            docker compose -f docker-compose.prod.yml --env-file .env up -d
            docker image prune -f
