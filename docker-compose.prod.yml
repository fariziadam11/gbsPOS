services:
  postgres:
    image: postgres:15-alpine
    container_name: gbs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: gbs_pos
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d gbs_pos"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gbs

  pos-api:
    image: ghcr.io/${GHCR_OWNER:-yourusername}/gbs-pos-api:latest
    container_name: gbs-pos-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8082:8080"
    environment:
      PORT: 8080
      ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/gbs_pos?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY_HOURS: 24
      LOG_LEVEL: info
    volumes:
      - pos-uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gbs
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  cms-api:
    image: ghcr.io/${GHCR_OWNER:-yourusername}/gbs-cms-api:latest
    container_name: gbs-cms-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8081"
    environment:
      PORT: 8081
      ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/gbs_pos?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY_HOURS: 24
      UPLOAD_DIR: /app/uploads
      LOG_LEVEL: info
    volumes:
      - cms-uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gbs
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  cms-web:
    image: ghcr.io/${GHCR_OWNER:-yourusername}/gbs-cms-web:latest
    container_name: gbs-cms-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:80"
    networks:
      - gbs
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  pgdata:
  pos-uploads:
  cms-uploads:

networks:
  gbs:
    driver: bridge
